<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>



    
<link rel="stylesheet" href="estilo.css">

</head>
<body>
    
 <nav>
    <a href="index.html">Inicio</a>
</nav>


<h1>Registro de Personas</h1>

<form id="formulario">

<input type="text" id="nombre" placeholder="Nombre" required>

<input type="text" id="apellido" placeholder="Apellido" required>

<input type="number" id="edad" placeholder="Edad" required>

<input type="number" id="altura" placeholder="Altura (metros)" step="0.01" required>

<input type="number" id="peso" placeholder="Peso (kg)" step="0.1" required>

<button type="submit">Agregar Persona</button>

</form>

<table>

<thead>

<tr>
<th>Nombre</th>
<th>Apellido</th>
<th>Edad</th>
<th>Altura</th>
<th>Peso</th>
<th>IMC</th>
<th>Acción</th>
</tr>

</thead>

<tbody id="tablaPersonas">

</tbody>

</table>



<script>

let personas=[];

document.getElementById("formulario").addEventListener("submit",agregarPersona);

function agregarPersona(event){

event.preventDefault();

let nombre=document.getElementById("nombre").value;
let apellido=document.getElementById("apellido").value;
let edad=document.getElementById("edad").value;
let altura=parseFloat(document.getElementById("altura").value);
let peso=parseFloat(document.getElementById("peso").value);

let imc=(peso/(altura*altura)).toFixed(2);

let persona={
nombre,
apellido,
edad,
altura,
peso,
imc
};

personas.push(persona);

mostrarPersonas();

document.getElementById("formulario").reset();

}


function mostrarPersonas(){

let tabla=document.getElementById("tablaPersonas");

tabla.innerHTML="";

for(let i=0;i<personas.length;i++){

tabla.innerHTML+=`

<tr>

<td>${personas[i].nombre}</td>

<td>${personas[i].apellido}</td>

<td>${personas[i].edad}</td>

<td>${personas[i].altura}</td>

<td>${personas[i].peso}</td>

<td>${personas[i].imc}</td>

<td>

<button onclick="eliminarPersona(${i})">
Eliminar
</button>

</td>

</tr>

`;

}

}

function eliminarPersona(indice){

personas.splice(indice,1);

mostrarPersonas();

}


</script>

</body>
</html>
